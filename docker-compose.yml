services:
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    mem_limit: 256m
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    mem_limit: 256m
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
